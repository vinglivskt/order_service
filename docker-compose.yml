services:
  api:
    build: .
    container_name: order_service_api
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - app-network
      - kafka-network
    develop:
      watch:
        - path: ./app
          action: sync
          target: /app/app
          ignore:
            - __pycache__/
        - path: ./migrations
          action: sync
          target: /app/migrations
          ignore:
            - __pycache__/
        - path: ./alembic.ini
          action: sync
          target: /app/alembic.ini
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild
        - path: ./Dockerfile
          action: rebuild

  consumer:
    build: .
    container_name: order_service_consumer
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    command: python -m app.messaging.consumer
    networks:
      - app-network
      - kafka-network
    develop:
      watch:
        - path: ./app
          action: sync
          target: /app/app
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild

  celery_worker:
    build: .
    container_name: order_service_celery_worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    networks:
      - app-network
    develop:
      watch:
        - path: ./app
          action: sync
          target: /app/app
        - path: ./pyproject.toml
          action: rebuild
        - path: ./uv.lock
          action: rebuild

  postgres:
    image: postgres:16-alpine
    container_name: order_service_postgres
    environment:
      POSTGRES_DB: orders_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orders_db"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: order_service_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - app-network

  kafka:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: order_service_kafka
    user: root
    restart: always
    ports:
      - "9092:9092"
    networks:
      - kafka-network
    environment:
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: yes
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      start_period: 20s
      retries: 10

  kafka-init:
    image: bitnamilegacy/kafka:4.0.0-debian-12-r10
    container_name: order_service_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "/opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists --topic new-order --partitions 1 --replication-factor 1 --bootstrap-server kafka:9092 && echo 'Kafka topic new-order created'"
    networks:
      - kafka-network

  kafka-ui:
    image: kafbat/kafka-ui:latest
    container_name: kafka-ui
    restart: always
    ports:
      - "8070:8080"
    environment:
      DYNAMIC_CONFIG_ENABLED: true
      KAFKA_CLUSTERS_0_NAME: "order-service"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
      KAFKA_CLUSTERS_0_READONLY: "false"
      AUTH_TYPE: "LOGIN_FORM"
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - kafka-network

networks:
  app-network:
    driver: bridge
  kafka-network:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
